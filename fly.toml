# fly.toml app configuration file generated for giae-calendar on 2026-03-02T23:08:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'giae-calendar'
primary_region = 'fra'
console_command = '/rails/bin/rails console'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = 'giae_data'
  destination = '/data'

[[cron]]
  job = "bin/rails jobs:workoff && bin/rails refresh_stale_meal_tickets"
  schedule = "20:00"
